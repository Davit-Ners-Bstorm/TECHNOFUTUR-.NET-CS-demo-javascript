<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices JavaScript</title>
    <script src="exo.js" defer></script>
</head>
<body>
    <h1>Exercices JavaScript</h1>

    <h2>Exercice 1 : Generer une phrase</h2>
    <label for="nom">Nom</label>
    <input type="text" id="nom">

    <label for="age">Age</label>
    <input type="number" id="age">

    <button id="btn1">Generer phrase</button>
    <p id="res1"></p>

    <hr>

    <h2>Exercice 2 : Calculateur d'IMC</h2>
    <label for="taille">Votre taille (en cm)</label>
    <input type="number" id="taille">

    <label for="poids">Votre poids (en kg)</label>
    <input type="number" id="poids">

    <button id="imcBtn">Calculer l'IMC</button>
    <p>Resultat :</p>
    <p id="imc"></p>
    <p id="status"></p>

    <hr>

    <h2>Exercice 3 : Calculateur d'age exact</h2>
    <input type="date" id="birthDate">

    <button id="calculateBtn">Calculer l'age</button>

    <div id="result"></div>
</body>
</html>
